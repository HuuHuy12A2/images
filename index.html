<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Media URL List</title>
<style>
body{font-family:Arial;padding:20px}
textarea{width:100%;height:400px}
button{padding:10px 20px;font-size:16px}
</style>
</head>
<body>
<h2>Media URLs</h2>
<button onclick="copyAll()">Copy All</button>
<br><br>
<textarea id="urls"></textarea>
<script>
const repo = "username/repo";
const branch = "main";
const folder = "general", "images assets"; // thư mục chứa ảnh/video
async function loadFiles(){
let api = `https://api.github.com/repos/${repo}/contents/${folder}?ref=${branch}`;
let res = await fetch(api);
let files = await res.json();
let urls = files.map(file => 
`https://cdn.jsdelivr.net/gh/${repo}@${branch}/${folder}/${file.name}`
);
document.getElementById("urls").value = urls.join("\n");
}
function copyAll(){
let text = document.getElementById("urls");
text.select();
document.execCommand("copy");
alert("Copied!");
}
loadFiles();
</script>
</body>
</html>
